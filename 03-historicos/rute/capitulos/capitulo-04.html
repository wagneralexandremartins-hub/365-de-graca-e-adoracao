            <div class="capitulo-text">
                <p>E Boaz subiu à porta, e assentou-se ali; e eis que o remidor de quem Boaz tinha falado ia passando. E disse-lhe: Ó fulano, desvia-te para cá, assenta-te aqui. E desviou-se, e assentou-se.</p>
<p>Então tomou dez homens dos anciãos da cidade, e disse: Assentai-vos aqui. E assentaram-se.</p>
<p>E disse ao remidor: Aquela parte da terra que foi de Elimeleque, nosso irmão, Noemi, que tornou da terra dos moabitas, a vendeu.</p>
<p>E disse eu: Manifestá-lo-ei em teus ouvidos, dizendo: Compra-o diante dos habitantes, e diante dos anciãos do meu povo; se o hás de redimir, redime-o, e se não, declara-mo, para que o saiba, pois outro não há, senão tu, que o redima, e eu depois de ti. Então disse ele: Eu o redimirei.</p>
<p>Disse porém Boaz: No dia em que comprares a terra da mão de Noemi, também a comprarás da mão de Rute, a moabita, mulher do falecido, para suscitar o nome do falecido sobre a sua herança.</p>
<p>Então disse o remidor: Para mim não a poderei redimir, para que não prejudique a minha herança; redime tu o meu direito, porque eu não o poderei redimir.</p>
<p>Havia, pois, já de muito tempo este costume em Israel, quanto à redenção e permuta, para confirmar todo o negócio; o homem descalçava o sapato e o dava ao seu próximo; e isto era por testemunho em Israel.</p>
<p>Disse, pois, o remidor a Boaz: Compra-a para ti. E descalçou o sapato.</p>
<p>Então disse Boaz aos anciãos e a todo o povo: Sois hoje testemunhas de que tomei tudo quanto foi de Elimeleque, e de Quiliom, e de Malom, da mão de Noemi.</p>
<p>E de que também tomo por mulher a Rute, a moabita, que foi mulher de Malom, para suscitar o nome do falecido sobre a sua herança, para que o nome do falecido não seja desarraigado dentre seus irmãos e da porta do seu lugar; disto sois hoje testemunhas.</p>
<p>E todo o povo que estava na porta, e os anciãos, disseram: Somos testemunhas; o Senhor faça a esta mulher, que entra na tua casa, como a Raquel e como a Lia, que ambas edificaram a casa de Israel; e porta-te valorosamente em Efrata, e faze-te nome afamado em Belém.</p>
<p>E seja a tua casa como a casa de Perez (que Tamar deu a Judá), da descendência que o Senhor te der desta moça.</p>
<p>Assim tomou Boaz a Rute, e ela lhe foi por mulher; e ele a possuiu, e o Senhor lhe fez conceber, e deu à luz um filho.</p>
<p>Então as mulheres disseram a Noemi: Bendito seja o Senhor, que não deixou hoje de te dar um remidor, e seja o seu nome afamado em Israel.</p>
<p>Ele te será por restaurador da alma, e nutrirá a tua velhice, pois tua nora, que te ama, o deu à luz, e ela te é melhor do que sete filhos.</p>
<p>E Noemi tomou o filho, e o pôs no seu colo, e foi sua ama.</p>
<p>E as vizinhas lhe deram um nome, dizendo: A Noemi nasceu um filho. E chamaram-lhe Obede. Este é o pai de Jessé, pai de Davi.</p>
<p>Estas são, pois, as gerações de Perez: Perez gerou a Esrom,</p>
<p>E Esrom gerou a Arão; e Arão gerou a Aminadabe;</p>
<p>E Aminadabe gerou a Naassom; e Naassom gerou a Salmom;</p>
<p>E Salmom gerou a Boaz; e Boaz gerou a Obede;</p>
<p>E Obede gerou a Jessé; e Jessé gerou a Davi.</p>
