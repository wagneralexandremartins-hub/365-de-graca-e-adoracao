            <div class="capitulo-text">
                <p>E sucedeu que, nos dias em que os juízes julgavam, houve uma fome na terra; por isso um homem de Belém de Judá saiu a peregrinar nos campos de Moabe, ele e sua mulher, e seus dois filhos.</p>
<p>E era o nome deste homem Elimeleque, e o de sua mulher Noemi, e os de seus dois filhos Malom e Quiliom, efrateus, de Belém de Judá; e chegaram aos campos de Moabe, e ficaram ali.</p>
<p>E morreu Elimeleque, marido de Noemi; e ficou ela com os seus dois filhos,</p>
<p>Os quais tomaram para si mulheres moabitas; e era o nome de uma Orfa, e o da outra Rute; e ficaram ali quase dez anos.</p>
<p>E morreram também ambos, Malom e Quiliom, ficando assim a mulher desamparada dos seus dois filhos e de seu marido.</p>
<p>Então se levantou ela com as suas noras, e voltou dos campos de Moabe, porquanto na terra de Moabe ouviu que o Senhor tinha visitado o seu povo, dando-lhe pão.</p>
<p>Por isso saiu do lugar onde estivera, e com ela as suas duas noras. E, indo elas caminhando, para voltarem para a terra de Judá,</p>
<p>Disse Noemi às suas duas noras: Ide, voltai cada uma à casa de sua mãe; e o Senhor use convosco de benevolência, como vós usastes com os falecidos e comigo.</p>
<p>O Senhor vos dê que acheis descanso cada uma em casa de seu marido. E, beijando-as ela, levantaram a sua voz e choraram.</p>
<p>E disseram-lhe: Certamente voltaremos contigo ao teu povo.</p>
<p>Porém Noemi disse: Voltai, minhas filhas. Por que iríeis comigo? Tenho eu ainda no meu ventre mais filhos, para que vos sejam por maridos?</p>
<p>Voltai, filhas minhas, ide-vos embora, que já mui velha sou para ter marido; e ainda que eu dissesse: Tenho esperança, ou ainda que esta noite tivesse marido e ainda tivesse filhos,</p>
<p>Esperá-los-íeis até que viessem a ser grandes? Deter-vos-íeis por eles, sem tomardes marido? Não, filhas minhas, que mais amargo me é a mim do que a vós mesmas; porquanto a mão do Senhor se descarregou contra mim.</p>
<p>Então levantaram a sua voz, e tornaram a chorar; e Orfa beijou a sua sogra, porém Rute se apegou a ela.</p>
<p>Por isso disse Noemi: Eis que voltou tua cunhada ao seu povo e aos seus deuses; volta tu também após tua cunhada.</p>
<p>Disse, porém, Rute: Não me instes para que te abandone, e deixe de seguir-te; porque aonde quer que tu fores irei eu, e onde quer que pousares, ali pousarei eu; o teu povo é o meu povo, o teu Deus é o meu Deus;</p>
<p>Onde quer que morreres morrerei eu, e ali serei sepultada. Faça-me assim o Senhor, e outro tanto, se outra coisa que não seja a morte me separar de ti.</p>
<p>Vendo, pois, que de todo estava resolvida a ir com ela, deixou de lhe falar.</p>
<p>Assim, pois, foram-se ambas, até que chegaram a Belém; e sucedeu que, entrando elas em Belém, toda a cidade se comoveu por causa delas, e diziam: Não é esta Noemi?</p>
<p>Porém ela lhes dizia: Não me chameis Noemi; chamai-me Mara; porque grande amargura me tem dado o Todo-Poderoso.</p>
<p>Cheia parti, porém vazia o Senhor me fez tornar; por que pois me chamareis Noemi, o Senhor testifica contra mim, e o Todo-Poderoso me tem afligido tanto?</p>
<p>Assim Noemi voltou, e com ela Rute a moabita, sua nora, que veio dos campos de Moabe; e chegaram a Belém no princípio da sega das cevadas.</p>
